<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>default</title>
    <script>
        if (localStorage.getItem('theme') === 'dark') 
        {
            document.documentElement.classList.add('dark');
        }
    </script>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
    <style> 
        a:link    {color:#0071e3; text-decoration:none}
        a:visited {color:#0071e3; text-decoration:none}
        a:hover   {color:#0077ed; text-decoration:underline; text-underline-offset: 3px}
        a:active  {color:#005bb5; text-decoration:none}

        div
        {
            margin: 10px;
            border: 1px solid #222;
        }
        #header
        {
            height: 80px;
            width: 99%;
            background-color: #ccc;
        }
        #content
        {
            height: 180px;
            width: 99%;
            background-color: #eee;
        }
        #footer
        {
            height: 80px;
            width: 99%;
            background-color: #ccc;
        }
    
    </style> <!-- colors that are displayed when hovering over and clicking text -->
</head>



<body>
    <button id="theme-btn">🌙 Dark Mode</button>


    <div class="next-page">
        <a href="index.html">Next Page</a>
    </div>


    <script src="script.js"></script>
</body>
