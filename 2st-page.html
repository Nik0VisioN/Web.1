<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
    <script src="script.js"></script>
    <style> 
        a:link    {color:rgb(139, 14, 223); text-decoration:none}
        a:visited {color:rgb(40, 9, 219); text-decoration:none}
        a:hover   {color:rgb(9, 233, 166); text-decoration:underline}
        a:active  {color:rgb(228, 16, 9); text-decoration:underline}

    div
        {
            margin: 10px;
            border: 1px solid #222;
        }
        #header
        {
            height: 80px;
            width: 99%;
            background-color: #ccc;
        }
        #content
        {
            height: 180px;
            width: 99%;
            background-color: #eee;
        }
        #footer
        {
            height: 80px;
            width: 99%;
            background-color: #ccc;
        }
    </style> <!-- colors that are displayed when hovering over and clicking text -->
</head>



<body>
    <div id="header">1</div>
    <div id="content">2</div>
    <div id="footer">3</div>
</body>
